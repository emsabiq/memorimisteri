name: Mistis Daily Part

on:
  workflow_dispatch:
  schedule:
    # Starts at 15:00 WIB (08:00 UTC), then retries every 15 minutes until late evening if the part fails.
    # The runner itself enforces one successful part per local day.
    - cron: "*/15 8-16 * * *"

concurrency:
  group: mistis-daily-part
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  generate-and-upload:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      PUBLIC_BASE_URL: ${{ secrets.PUBLIC_BASE_URL }}
      UPLOAD_DRIVER: ${{ secrets.UPLOAD_DRIVER }}
      SFTP_HOST: ${{ secrets.SFTP_HOST }}
      SFTP_PORT: ${{ secrets.SFTP_PORT }}
      SFTP_USER: ${{ secrets.SFTP_USER }}
      SFTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
      SFTP_REMOTE_DIR: ${{ secrets.SFTP_REMOTE_DIR }}
      FTP_HOST: ${{ secrets.FTP_HOST }}
      FTP_PORT: ${{ secrets.FTP_PORT }}
      FTP_USER: ${{ secrets.FTP_USER }}
      FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}

      AUTOMATION_ENABLED: "true"
      DAILY_PART_UPLOAD_ENABLED: "true"
      PART_UPLOAD_RETRY_MINUTES: ${{ secrets.PART_UPLOAD_RETRY_MINUTES }}
      SOCIAL_ACCOUNT_NAME: memorimisteri

      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
      STORY_MODEL: ${{ secrets.STORY_MODEL }}
      IMAGE_MODEL: ${{ secrets.IMAGE_MODEL }}
      IMAGE_SIZE: ${{ secrets.IMAGE_SIZE }}
      IMAGE_QUALITY: ${{ secrets.IMAGE_QUALITY }}
      OPENAI_TTS_MODEL: ${{ secrets.OPENAI_TTS_MODEL }}
      OPENAI_TTS_VOICE: ${{ secrets.OPENAI_TTS_VOICE }}
      OPENAI_TRANSCRIBE_MODEL: ${{ secrets.OPENAI_TRANSCRIBE_MODEL }}
      ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
      ELEVENLABS_MODEL: ${{ secrets.ELEVENLABS_MODEL }}
      ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
      MISTIS_TTS_PROVIDER: ${{ secrets.MISTIS_TTS_PROVIDER }}

      MISTIS_IDEA: ${{ secrets.MISTIS_IDEA }}
      MISTIS_EPISODE_TITLE: ${{ secrets.MISTIS_EPISODE_TITLE }}
      MISTIS_TOTAL_PARTS: ${{ secrets.MISTIS_TOTAL_PARTS }}
      MISTIS_THEME: ${{ secrets.MISTIS_THEME }}
      MISTIS_DURATION: ${{ secrets.MISTIS_DURATION }}
      MISTIS_SCENES: ${{ secrets.MISTIS_SCENES }}

      GRAPH_API_VERSION: ${{ secrets.GRAPH_API_VERSION }}
      FACEBOOK_UPLOAD_ENABLED: ${{ secrets.FACEBOOK_UPLOAD_ENABLED }}
      FACEBOOK_PAGE_ID: ${{ secrets.MISTIS_FACEBOOK_PAGE_ID }}
      FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.MISTIS_FACEBOOK_PAGE_ACCESS_TOKEN }}
      FACEBOOK_USER_ACCESS_TOKEN: ${{ secrets.MISTIS_FACEBOOK_USER_ACCESS_TOKEN }}
      FACEBOOK_MEDIA_TYPE: ${{ secrets.FACEBOOK_MEDIA_TYPE }}
      FACEBOOK_VIDEO_STATE: ${{ secrets.FACEBOOK_VIDEO_STATE }}

      INSTAGRAM_UPLOAD_ENABLED: ${{ secrets.INSTAGRAM_UPLOAD_ENABLED }}
      INSTAGRAM_IG_USER_ID: ${{ secrets.MISTIS_INSTAGRAM_IG_USER_ID }}
      INSTAGRAM_ACCESS_TOKEN: ${{ secrets.MISTIS_INSTAGRAM_ACCESS_TOKEN }}
      INSTAGRAM_SHARE_TO_FEED: ${{ secrets.INSTAGRAM_SHARE_TO_FEED }}
      INSTAGRAM_MAX_DURATION_SECONDS: ${{ secrets.INSTAGRAM_MAX_DURATION_SECONDS }}
      INSTAGRAM_CONTAINER_POLL_SECONDS: ${{ secrets.INSTAGRAM_CONTAINER_POLL_SECONDS }}
      INSTAGRAM_CONTAINER_MAX_ATTEMPTS: ${{ secrets.INSTAGRAM_CONTAINER_MAX_ATTEMPTS }}

      THREADS_UPLOAD_ENABLED: ${{ secrets.THREADS_UPLOAD_ENABLED }}
      THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
      THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
      THREADS_GRAPH_BASE_URL: ${{ secrets.THREADS_GRAPH_BASE_URL }}

    steps:
      - uses: actions/checkout@v5

      - name: Initialize run log
        shell: bash
        run: |
          mkdir -p .github-run-logs
          {
            echo "# Mistis Daily Part"
            echo "run_id=$GITHUB_RUN_ID"
            echo "workflow=$GITHUB_WORKFLOW"
            echo "actor=$GITHUB_ACTOR"
            echo "ref=$GITHUB_REF"
            echo "sha=$GITHUB_SHA"
            echo "utc=$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            echo "public_base_url_configured=$([ -n "$PUBLIC_BASE_URL" ] && echo yes || echo no)"
            echo "remote_upload_configured=$([ -n "$FTP_HOST$SFTP_HOST" ] && echo yes || echo no)"
            echo "facebook_upload_enabled=${FACEBOOK_UPLOAD_ENABLED:-false}"
            echo "instagram_upload_enabled=${INSTAGRAM_UPLOAD_ENABLED:-false}"
            echo "threads_upload_enabled=${THREADS_UPLOAD_ENABLED:-false}"
          } | tee .github-run-logs/run-context.txt

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install FFmpeg
        shell: bash
        run: |
          set -o pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg 2>&1 | tee .github-run-logs/install-ffmpeg.log

      - name: Install dependencies
        shell: bash
        run: |
          set -o pipefail
          npm ci --no-audit --fund=false 2>&1 | tee .github-run-logs/npm-ci.log

      - name: Validate source
        shell: bash
        run: |
          set -o pipefail
          npm run check 2>&1 | tee .github-run-logs/check.log

      - name: Preflight
        shell: bash
        run: |
          set -o pipefail
          npm run preflight 2>&1 | tee .github-run-logs/preflight.log

      - name: Inspect remote daily state
        shell: bash
        run: |
          set -o pipefail
          node --input-type=module <<'EOF' 2>&1 | tee .github-run-logs/remote-state.log
          const base = String(process.env.PUBLIC_BASE_URL || "").replace(/\/+$/g, "");
          if (!base) {
            console.log(JSON.stringify({ ok: false, skipped: true, reason: "PUBLIC_BASE_URL empty" }, null, 2));
            process.exit(0);
          }
          const response = await fetch(`${base}/state/stories.json?v=${Date.now()}`, { cache: "no-store" });
          const text = await response.text();
          let stories = [];
          try {
            stories = JSON.parse(text);
          } catch {}
          if (!Array.isArray(stories)) stories = [];
          const today = new Date().toISOString().slice(0, 10);
          const uploadedToday = stories
            .filter((story) => story?.publish?.state === "uploaded" && String(story.publish.uploadedAt || "").startsWith(today))
            .map((story) => ({
              id: story.id,
              title: story.title,
              part: story.plan?.episode?.currentPart || story.input?.partNumber || "",
              uploadedAt: story.publish.uploadedAt
            }));
          console.log(JSON.stringify({
            ok: response.ok,
            status: response.status,
            storyCount: stories.length,
            uploadedToday
          }, null, 2));
          EOF

      - name: Generate, upload, and publish one due part
        shell: bash
        run: |
          set -o pipefail
          npm run run:once 2>&1 | tee .github-run-logs/run-once.log

      - name: Write action summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Mistis Daily Part"
            echo ""
            echo "- Run ID: \`$GITHUB_RUN_ID\`"
            echo "- Ref: \`$GITHUB_REF\`"
            echo "- SHA: \`$GITHUB_SHA\`"
            echo "- UTC: \`$(date -u +"%Y-%m-%dT%H:%M:%SZ")\`"
            echo ""
            echo "### Remote State"
            echo '```json'
            if [ -f .github-run-logs/remote-state.log ]; then
              tail -n 80 .github-run-logs/remote-state.log
            else
              echo '{"status":"not collected"}'
            fi
            echo '```'
            echo ""
            echo "### Run Once"
            echo '```'
            if [ -f .github-run-logs/run-once.log ]; then
              tail -n 120 .github-run-logs/run-once.log
            else
              echo "run-once did not start"
            fi
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload action logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mistis-daily-part-logs-${{ github.run_id }}
          path: .github-run-logs/
          if-no-files-found: warn
          retention-days: 14
